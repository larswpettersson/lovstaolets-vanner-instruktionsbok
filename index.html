<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visuell Instruktionsbok - Lövstaölets Vänner</title>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    header {
      padding: 2rem 1rem 1rem;
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    p {
      margin: 0.5rem 0 0;
      color: #334155;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      padding: 1rem;
      max-width: 1200px;
      margin: 0 auto 2rem;
    }
    figure {
      margin: 0;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(15, 23, 42, 0.08);
    }
    img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }
    figcaption {
      padding: 0.6rem 0.8rem;
      font-size: 0.85rem;
      color: #475569;
      word-break: break-word;
    }
  </style>
</head>
<body>
  <header>
    <h1>Visuell Instruktionsbok</h1>
    <p>Lövstaölets Vänner</p>
  </header>

  <main class="gallery">
    <figure><img src="IMG_0472.JPG" alt="IMG_0472"><figcaption>IMG_0472.JPG</figcaption></figure>
    <figure><img src="IMG_0473.JPG" alt="IMG_0473"><figcaption>IMG_0473.JPG</figcaption></figure>
    <figure><img src="IMG_0487.JPG" alt="IMG_0487"><figcaption>IMG_0487.JPG</figcaption></figure>
    <figure><img src="IMG_0530.JPG" alt="IMG_0530"><figcaption>IMG_0530.JPG</figcaption></figure>
    <figure><img src="IMG_0535.JPG" alt="IMG_0535"><figcaption>IMG_0535.JPG</figcaption></figure>
    <figure><img src="IMG_0552.JPG" alt="IMG_0552"><figcaption>IMG_0552.JPG</figcaption></figure>
    <figure><img src="IMG_0555.JPG" alt="IMG_0555"><figcaption>IMG_0555.JPG</figcaption></figure>
    <figure><img src="IMG_0563.JPG" alt="IMG_0563"><figcaption>IMG_0563.JPG</figcaption></figure>
    <figure><img src="IMG_0566.JPG" alt="IMG_0566"><figcaption>IMG_0566.JPG</figcaption></figure>
    <figure><img src="IMG_0577.JPG" alt="IMG_0577"><figcaption>IMG_0577.JPG</figcaption></figure>
  </main>
</body>
</html>
